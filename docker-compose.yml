version: "3.8"

services:
  trader:
    build: .
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POLYMARKET_PRIVATE_KEY=${POLYMARKET_PRIVATE_KEY}
      - POLYMARKET_API_KEY=${POLYMARKET_API_KEY}
    command: python real_trade.py --mode live --size 50
