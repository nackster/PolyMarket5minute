version: "3.8"

volumes:
  tradedata:   # shared volume for JSON trade files between all services

services:

  # ── 5-minute live bot ───────────────────────────────────────────────────
  trader:
    build: .
    restart: always
    env_file: .env
    volumes:
      - tradedata:/app/trades
    command: python real_trade.py --mode paper --size 50

  # ── Hourly paper bot ────────────────────────────────────────────────────
  hourly:
    build: .
    restart: always
    env_file: .env
    volumes:
      - tradedata:/app/trades
    command: python real_trade_hourly.py --mode paper --size 50

  # ── Hyperliquid futures bot (paper) ─────────────────────────────────
  hl-trader:
    build: .
    restart: always
    env_file: .env
    volumes:
      - tradedata:/app/trades
    command: python hyperliquid_trader.py --mode paper --size 1000 --leverage 5

  # ── Hourly $5 live test ─────────────────────────────────────────────
  hourly-live-test:
    build: .
    restart: "no"
    env_file: .env
    volumes:
      - tradedata:/app/trades
    command: python real_trade_hourly.py --mode live --size 5

  # ── Crypto momentum bot ─────────────────────────────────────────────────
  momentum:
    build: .
    restart: always
    env_file: .env
    volumes:
      - tradedata:/app/trades
    command: python crypto_momentum_bot.py --daemon

  # ── BB Reversal ETH scalper ──────────────────────────────────────────────
  bb:
    build: .
    restart: always
    env_file: .env
    volumes:
      - tradedata:/app/trades
    command: python scalper_bb.py --daemon --capital 25000 --leverage 5

  # ── Web dashboard ───────────────────────────────────────────────────────
  web:
    build: .
    restart: always
    env_file: .env
    volumes:
      - tradedata:/app/trades
    ports:
      - "8080:8080"
    command: python web.py
